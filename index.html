<!DOCTYPE html>
<html lang="en" class="h-full w-full overflow-hidden">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Alpha Capital Gateway | Secure Terminal Portal</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#030712">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* Lock root bounds to prevent mobile elasticity / overscroll pull */
        html, body {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            height: 100dvh;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #030712;
            -webkit-tap-highlight-color: transparent;
            touch-action: auto;
        }

        /* Enforce exact iframe sizing and allow touch interactions */
        iframe {
            width: 100% !important;
            height: 100% !important;
            min-width: 100% !important;
            min-height: 100% !important;
            border: none;
            pointer-events: auto;
        }
    </style>
</head>
<body class="bg-[#030712] text-gray-100 antialiased w-full h-full">

    <!-- 
      - Mobile (default): Shift down 10vh (translate-y-[10vh] & h-[90vh])
      - Desktop (md: and up): Shift down 30px (md:translate-y-[30px] & md:h-[calc(100vh-30px)])
    -->
    <main class="w-full h-[90vh] translate-y-[10vh] md:h-[calc(100vh-30px)] md:translate-y-[30px] relative overflow-hidden bg-[#030712]">
        <iframe 
            src="https://script.google.com/macros/s/AKfycby34YxSiYxCe2nbQ6oYlbj5_eu4uyhTuPOj19QeTW29e5COqt0WXjeRyZhzkHwbMDorug/exec" 
            title="Alpha Capital Execution Terminal"
            allow="autoplay; clipboard-read; clipboard-write">
        </iframe>
    </main>

</body>
</html>
